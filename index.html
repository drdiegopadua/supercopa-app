<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Voleibol Copa</title>

<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header class="topbar">

  <div class="brand">
    <img src="assets/logo.png" class="logo">

    <div>
      <small>6ª EDIÇÃO</small>
      <h1>SUPER VOLEIBOL COPA</h1>
    </div>
  </div>

</header>

<main>

  <section id="homePage" class="page active-page">

    <section class="hero">

      <div class="overlay"></div>

      <div class="hero-content">

        <div class="live-chip">
          🔴 AO VIVO
        </div>

        <h2>
          O MAIOR TORNEIO
          MASCULINO DA REGIÃO
        </h2>

        <p>
          Jogos • Tabela • Mata-mata • Estatísticas
        </p>

        <div class="countdown" id="countdown">
          12 DIAS
        </div>

        <div class="hero-buttons">
          <button onclick="openTab('gamesPage')">
            VER JOGOS
          </button>

          <button onclick="openTab('tablePage')">
            VER TABELA
          </button>
        </div>

      </div>

    </section>

  </section>

  <section id="gamesPage" class="page">

    <h2 class="title">📅 Jogos</h2>

    <div class="game-card">

      <div class="game-header">
        <span class="live">AO VIVO</span>
        <span>2º SET</span>
      </div>

      <div class="game-main">

        <div class="team">
          <img src="https://cdn-icons-png.flaticon.com/512/53/53283.png">
          <span>AFC</span>
        </div>

        <div class="score">
          18 × 14
        </div>

        <div class="team">
          <img src="https://cdn-icons-png.flaticon.com/512/53/53283.png">
          <span>TITANS</span>
        </div>

      </div>

    </div>

  </section>

  <section id="tablePage" class="page">

    <h2 class="title">🏆 Tabela</h2>

    <div class="table-card">

      <table>

        <thead>
          <tr>
            <th>#</th>
            <th>Equipe</th>
            <th>Pts</th>
          </tr>
        </thead>

        <tbody>

          <tr>
            <td>1</td>
            <td>AFC</td>
            <td>9</td>
          </tr>

          <tr>
            <td>2</td>
            <td>TITANS</td>
            <td>6</td>
          </tr>

        </tbody>

      </table>

    </div>

  </section>

  <section id="bracketPage" class="page">

    <h2 class="title">🏆 Mata-mata</h2>

    <div class="bracket-wrapper">

      <div class="bracket-column">

        <h3>Quartas</h3>

        <div class="match-card">
          AFC 3 × 1 LOBOS
        </div>

        <div class="match-card">
          TITANS 3 × 0 FÊNIX
        </div>

      </div>

      <div class="bracket-column">

        <h3>Semi</h3>

        <div class="match-card gold">
          AFC × TITANS
        </div>

      </div>

    </div>

  </section>

</main>

<nav class="bottom-nav">

  <button class="nav-btn active" onclick="openTab('homePage', this)">
    🏠
    <small>Início</small>
  </button>

  <button class="nav-btn" onclick="openTab('gamesPage', this)">
    📅
    <small>Jogos</small>
  </button>

  <button class="nav-btn" onclick="openTab('tablePage', this)">
    📊
    <small>Tabela</small>
  </button>

  <button class="nav-btn" onclick="openTab('bracketPage', this)">
    🏆
    <small>Mata-mata</small>
  </button>

</nav>

<script src="app.js"></script>
</body>
</html>
